# SwiftLint configuration for mcp-snippetslab

# Only check source files, skip .build
included:
  - Sources
  - Tests

# Rules to enable (opting in beyond defaults)
opt_in_rules:
  - force_unwrapping
  - implicitly_unwrapped_optional
  - redundant_nil_coalescing
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - convenience_type
  - discouraged_optional_boolean
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - last_where
  - legacy_multiple
  - legacy_random
  - let_var_whitespace
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_type_annotation
  - required_enum_case
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rules to disable
disabled_rules:
  - file_header            # We don't use file headers
  - function_body_length   # Fine with long functions in MCP handlers
  - type_body_length       # Fine for test files
  - file_length            # Fine for test files
  - multiline_arguments    # Stylistic preference
  - closure_body_length    # Some handler closures are long
  - force_unwrapping       # Only for test assertions
  - implicitly_unwrapped_optional  # Used in some patterns
  - function_parameter_count # NSKeyedArchiver dict builders need many params
  - force_try              # Test assertions use try! intentionally
  - let_var_whitespace     # Conflicts with Swift formatting preferences

# Custom rule configuration
identifier_name:
  min_length: 1
  max_length: 60
  excluded:
    - id
    - ok
    - ttl

line_length:
  warning: 140
  error: 200
  ignores_comments: true

nesting:
  type_level: 2

cyclomatic_complexity:
  warning: 12
  error: 20

reporter: "xcode"
